exp_name: ravdess_audio_wavlm_lstm_final_attentive

expert:
  type: audio_WavLM_experts
  feat_root: 'audio_wavlm-FINAL'
  input_dim: 1024
  num_classes: 8

  # ===== 结构切换点 =====
  method: lstm
  hidden_dim: 128
  num_layers: 2
  dropout: 0.30

  # ===== 数据读取 =====
  max_frames: 600
  pad_mode: right
  mmap: false

  # ===== frozen 特征增广 =====
  time_mask_prob: 0.5
  time_mask_max_width: 20
  time_mask_num: 2

train:
  epochs: 30
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_ratio: 0.05
  grad_clip: 5.0
  early_stop:
    enabled: true
    patience: 8
    metric: uar

loss:
  type: weighted_ce

log:
  save_preds: true
