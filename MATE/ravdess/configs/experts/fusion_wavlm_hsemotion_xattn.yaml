exp_name: ravdess_fusion_wavlm_hsemotion_xattn

expert:
  # IMPORTANT: must start with "fusion_" to trigger fusion dataloader
  type: fusion_av_xattn

  # ===== feature roots (EDIT THESE PATHS) =====
  # audio: WavLM / Whisper frame features (.npy)
  audio_feat_root: 'audio_wavlm'
  audio_ext: .npy
  audio_input_dim: 1024

  # video: HSEmotion / expression embedding sequence (.npz)
  video_feat_root: 'hsemotion_enet_b2_7_seq_npz'
  video_ext: .npz
  video_feat_key: x
  video_input_dim: 1408

  # label space
  num_classes: 8

  # ===== model =====
  hidden_dim: 256
  nhead: 4
  ffn_dim: 1024
  num_layers_audio: 2
  num_layers_video: 2
  num_layers_shared: 2
  dropout: 0.4

  use_pos_enc: true
  pos_max_len: 4000
  modality_emb: true
  attn_hidden: 128

  # ===== dataloader padding =====
  max_frames_audio: 600
  max_frames_video: 300
  pad_mode: right
  pin_memory: true

train: {epochs: 35, batch_size: 48, lr: 1.0e-3, weight_decay: 1.0e-4, scheduler: cosine, warmup_ratio: 0.05, grad_clip: 5.0,
  early_stop: {enabled: true, patience: 10, metric: uar}}

loss: {type: weighted_ce}
log: {save_preds: true}
