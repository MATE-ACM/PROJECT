exp_name: ravdess_whisper_cnn_attention

expert:
  type: audio_whisper_experts
  feat_root: 'audio_whisper'
  input_dim: 1280
  num_classes: 8

  encoder: cnn
  pool: attn_mean

  hidden_dim: 256
  num_layers: 3
  dropout: 0.25
  kernel_size: 3

  max_frames: 600
  pad_mode: right
  mmap: false

  time_mask_prob: 0.5
  time_mask_max_width: 20
  time_mask_num: 2

train:
  epochs: 30
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_ratio: 0.05
  grad_clip: 5.0
  early_stop:
    enabled: true
    patience: 8
    metric: uar

loss:
  type: weighted_ce

log:
  save_preds: true
