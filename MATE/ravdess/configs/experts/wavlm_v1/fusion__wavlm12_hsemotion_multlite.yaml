exp_name: ravdess_fusion_wavlm_last12_hsemotion_multlite

expert:
  type: fusion_av_multlite

  # ===== feature roots (EDIT THESE PATHS) =====
  audio_feat_root: 'audio_wavlm_avg_last12'
  audio_ext: .npy
  audio_input_dim: 1024

  video_feat_root: 'hsemotion_enet_b2_7_seq_npz'
  video_ext: .npz
  video_feat_key: x
  video_input_dim: 1408

  num_classes: 8

  # ===== model hyperparams =====
  hidden_dim: 256
  dropout: 0.4
  use_pos_enc: true
  pos_max_len: 4000

  # optional modality encoders
  num_layers_audio: 1
  num_layers_video: 1

  # MulT-lite core
  num_layers_xattn: 2
  num_layers_refine: 1
  nhead: 4
  ffn_dim: 1024
  attn_hidden: 128

  # ===== dataloader padding =====
  max_frames_audio: 600
  max_frames_video: 300
  pad_mode: right
  pin_memory: true

train:
  epochs: 35
  batch_size: 48
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_ratio: 0.05
  grad_clip: 5.0
  early_stop: {enabled: true, patience: 10, metric: uar}

loss: {type: weighted_ce}
log: {save_preds: true}
