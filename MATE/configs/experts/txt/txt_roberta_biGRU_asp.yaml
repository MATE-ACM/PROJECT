exp_name: meld_txt_roberta_biGRU_asp

expert:
  type: txt_experts

  feat_root: 'data/features/roberta_large/utt'
  ext: .npy

  input_dim: 1024
  num_classes: 4

  # ===== Classic SER head: BiGRU + Attentive Stats Pooling (ASP) =====
  # Strong baseline when you have token-level [T,D] embeddings.
  # If your feature is [D], T=1 and it degenerates to an MLP-ish classifier (still works).
  encoder: gru          # gru | lstm
  bidirectional: true
  pool: attn_stats

  hidden_dim: 256       # MUST be even when bidirectional=true
  num_layers: 2
  dropout: 0.35

  head: linear

  # ===== Data reading =====
  max_frames: 256
  pad_mode: right
  mmap: false

  # ===== Frozen-feature augmentation =====
  time_mask_prob: 0.3
  time_mask_max_width: 12
  time_mask_num: 2

train:
  epochs: 30
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_ratio: 0.05
  grad_clip: 5.0
  early_stop:
    enabled: true
    patience: 8
    metric: uar

loss:
  type: weighted_ce

log:
  save_preds: true
