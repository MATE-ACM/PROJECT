exp_name: cremad_video_openface_linear_attn

expert:
  type: video_experts
  feat_root: 'openface_npz_v2'
  ext: .npz
  feat_key: x
  input_dim: 22
  num_classes: 6

  mode: linear_attn
  pool: attn_mean
  attn_hidden: 64

  max_frames: 300
  pad_mode: right

train:
  epochs: 30
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_ratio: 0.05
  grad_clip: 5.0
  early_stop:
    enabled: true
    patience: 8
    metric: uar

loss:
  type: weighted_ce

log:
  save_preds: true
