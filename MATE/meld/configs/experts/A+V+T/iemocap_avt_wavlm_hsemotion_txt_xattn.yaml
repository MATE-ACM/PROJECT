# NOTE: text_input_dim=768 is a placeholder; set it to your real text feature dim.
exp_name: meld_fusion_avt_xattn_wavlm_hsemotion_txt
expert:
  type: fusion_avt_xattn
  audio_feat_root: 'data/features/wavlm_large_avg_all24/frame'
  audio_ext: .npy
  audio_input_dim: 1024
  video_feat_root: 'data/features/video_hsemotion_seq_npz'
  video_ext: .npz
  video_feat_key: x
  video_input_dim: 1408
  text_feat_root: 'data/features/roberta_large/frame'
  text_ext: .npy
  text_input_dim: 1024
  num_classes: 4
  hidden_dim: 256
  nhead: 4
  ffn_dim: 1024
  num_layers_audio: 2
  num_layers_video: 2
  num_layers_text: 2
  num_layers_shared: 2
  dropout: 0.4
  use_pos_enc: true
  pos_max_len: 4000
  modality_emb: true
  attn_hidden: 128
  max_frames_audio: 600
  max_frames_video: 300
  max_frames_text: 128
  pad_mode: right
  pin_memory: true
train:
  epochs: 35
  batch_size: 48
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_ratio: 0.05
  grad_clip: 5.0
  early_stop:
    enabled: true
    patience: 10
    metric: uar
loss:
  type: weighted_ce
log:
  save_preds: true
