exp_name: iemocap_txt_roberta_utt_mlp

expert:
  # IMPORTANT: expert.type must start with "txt_" so dataloader dispatcher can route it.
  type: txt_experts

  # Where you saved iemocap_text_extract.py output: <feat_root>/<utt_id>.npy
  feat_root: 'text_roberta_merbench_FRAME'#这实际是文本
  ext: .npy

  # roberta-large CLS dim = 1024 (change if you used another HF model)
  input_dim: 1024
  num_classes: 4  # placeholder; scripts/train.py will override based on dataset labels

  # ===== Typical text-head (utterance embedding) =====
  # If your feature is [D], dataset reshapes to [1,D] automatically.
  encoder: none          # none | gru | lstm | tcn_gn | tcn_bn | transformer
  pool: attn_mean        # attn_mean | attn_stats

  hidden_dim: 256
  num_layers: 1
  dropout: 0.35

  # Use a small MLP head (very common for sentence embeddings)
  head: mlp              # linear | mlp
  head_hidden: 256

  # ===== Data reading =====
  max_frames: 256         # only matters if your saved feature is [T,D]
  pad_mode: right
  mmap: false

  # ===== Frozen-feature augmentation (optional) =====
  time_mask_prob: 0.0
  time_mask_max_width: 20
  time_mask_num: 2

train:
  epochs: 30
  batch_size: 64
  lr: 8.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_ratio: 0.05
  grad_clip: 5.0
  early_stop:
    enabled: true
    patience: 8
    metric: uar

loss:
  type: weighted_ce

log:
  save_preds: true
