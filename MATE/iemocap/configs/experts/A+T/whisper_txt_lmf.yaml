exp_name: iemocap_fusion_whisper_txt_lmf
expert:
  type: fusion_av_lmf
  audio_feat_root: 'audio_wavlm_avg_all'
  audio_ext: .npy
  audio_input_dim: 1024
  # TEXT as the second branch (reuse 'video' slot)
  video_feat_root: 'text_roberta_merbench_FRAME'#这实际是文本
  video_ext: .npy
  video_input_dim: 1024  # TODO: set to your text feat dim
  num_classes: 4
  hidden_dim: 256
  dropout: 0.3
  use_pos_enc: true
  pos_max_len: 4000
  num_layers_audio: 1
  num_layers_video: 1
  nhead: 4
  ffn_dim: 1024
  attn_hidden: 128
  lmf_rank: 8
  fusion_out_dim: 256
  max_frames_audio: 600
  max_frames_video: 128   # TODO: max text tokens
  pad_mode: right
  pin_memory: true
train:
  epochs: 35
  batch_size: 48
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_ratio: 0.05
  grad_clip: 5.0
  early_stop: {enabled: true, patience: 10, metric: uar}
loss: {type: weighted_ce}
log: {save_preds: true}
